<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <!-- Glowing Filters -->
    <filter id="neonBlueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neonPurpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes spinCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spinCCW {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    .spin-cw {
      animation: spinCW 25s linear infinite;
      transform-origin: 234px 281px;
    }
    .spin-ccw {
      animation: spinCCW 15s linear infinite;
      transform-origin: 234px 281px;
    }
    
    /* Central HUD Spin Elements */
    .hud-spin-cw {
      animation: spinCW 30s linear infinite;
      transform-origin: 737px 269px;
    }
    .hud-spin-ccw {
      animation: spinCCW 20s linear infinite;
      transform-origin: 737px 269px;
    }

    .pulse-glow {
      animation: pulseGlow 4s ease-in-out infinite;
    }
  </style>

  <!-- Background 3D Photorealistic Image -->
  <image href="cyberpunk_hologram_hero.jpg" x="0" y="0" width="1200" height="675" />

  <!-- Animated Vector Overlays on Portrait Circle -->
  <g filter="url(#neonBlueGlow)">
    <!-- Outer spinning dash ring -->
    <circle cx="234" cy="281" r="144" class="spin-cw" fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-dasharray="35 55 15 25" stroke-opacity="0.8" />
    <!-- Inner spinning dash ring -->
    <circle cx="234" cy="281" r="136" class="spin-ccw" fill="none" stroke="#bd93f9" stroke-width="1.5" stroke-dasharray="20 40 8 12" stroke-opacity="0.6" />
  </g>

  <!-- Animated Vector Overlays on Central HUD Ring -->
  <g filter="url(#neonBlueGlow)">
    <circle cx="737" cy="269" r="105" class="hud-spin-cw" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="40 80 15 45" stroke-opacity="0.6" />
    <circle cx="737" cy="269" r="95" class="hud-spin-ccw" fill="none" stroke="#bd93f9" stroke-width="1" stroke-dasharray="25 50 10 25" stroke-opacity="0.4" />
  </g>
</svg>
